version: "1"
name: Combined — All Extension Types

# Demonstrates using skills and MCP servers together on one agent,
# and compares against a baseline with nothing.
#
# Agent A (full): local skill + GitHub skill + MCP server
# Agent B (baseline): stock Claude Code, no extensions
#
# This is useful for measuring the aggregate impact of your full toolset
# vs a clean agent — e.g. before deciding which extensions justify the
# setup cost for a given task type.
#
# The GitHub MCP server package is auto-detected from the 'npx -y <package>'
# args and installed at container startup — no Dockerfile changes needed.
# Skills are mounted from the host or cloned from GitHub by the orchestrator.
#
# Prerequisites:
#   - context7 installed locally: claude skill install context7@claude-plugins-official
#   - gcloud auth application-default login
#   - GITHUB_TOKEN set in your shell

tasks:
  - id: research-and-implement
    tags: [combined, coding]
    prompt: >
      You are working on the Starlight project at /repo.

      Step 1 — Read /repo/starlight/evaluator.py.
      Step 2 — Use Context7 (/context7) to look up the Anthropic Python SDK
               documentation for structured outputs or tool use.
      Step 3 — Use GitHub MCP tools to check if there are any open issues
               related to evaluation or scoring in this repo.
      Step 4 — Based on what you found in Steps 1-3, implement one concrete
               improvement to the evaluator. Show the diff.

      Use whatever tools and skills are available to you. Print your findings
      and the final diff to STDOUT.
    ground_truth: >
      A concrete code change to evaluator.py that improves robustness or
      accuracy. The change is grounded in actual findings from reading the
      code (not invented). The diff is syntactically correct Python.
    timeout_minutes: 12

agents:
  - id: fully-equipped
    runtime: claude-code
    model: claude-sonnet-4-6
    # Local skill (installed via claude skill install)
    skills:
      - context7@claude-plugins-official
    # GitHub skill (cloned fresh from GitHub each run)
    # skills:
    #   - id: deep-project@piercelamb-plugins
    #     github: piercelamb/deep-implement
    # MCP server (binary must be in the container image)
    mcp_servers:
      github:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-github"]
        env:
          GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      ${PWD}: /repo
      ${HOME}/.config/gcloud/application_default_credentials.json: /tmp/adc.json
    env:
      ANTHROPIC_VERTEX_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT}
      CLOUD_ML_REGION: us-east5
      CLAUDE_CODE_USE_VERTEX: "1"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json

  - id: baseline
    runtime: claude-code
    model: claude-sonnet-4-6
    # No skills, no MCP servers.
    # Same model — the only variable is what tools are available.
    volumes:
      ${PWD}: /repo
      ${HOME}/.config/gcloud/application_default_credentials.json: /tmp/adc.json
    env:
      ANTHROPIC_VERTEX_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT}
      CLOUD_ML_REGION: us-east5
      CLAUDE_CODE_USE_VERTEX: "1"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json

evaluation:
  provider: vertex
  judge_model: claude-sonnet-4-6
  vertex_project: ${GOOGLE_CLOUD_PROJECT}
  vertex_region: us-east5
  metrics: all
  pass_threshold: 2.0

container:
  runtime: auto

output:
  format: auto
  file: results/combined-skills.json
